name: Release

on:
  release:
    types: [created]

env:
  GO_WEBEXT_VERSION: v0.4.1
  CHROME_API_VERSION: v2
  CHROME_APP_ID: bfjbejmeoibbdpfdbmbacmefcbannnbg

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Set version via tag
        run: npm version --no-git-tag-version ${{ github.event.release.tag_name }}
      - name: Resolve version
        run: |
          tag='${{ github.event.release.tag_name }}'
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"
      - name: Build zip packages
        run: |
          npm run zip
          npm run zip:firefox
      - name: Submit to Firefox Add-ons
        uses: ninoseki/go-webext-action@c7216cca9656856a307ca5af64ddbb4c70831a99 # v1.1.0
        with:
          version: ${{ env.GO_WEBEXT_VERSION }}
          command: update
          browser: firefox
          file: .output/mitaka-${{ env.VERSION }}-firefox.zip
          source: .output/mitaka-${{ env.VERSION }}-sources.zip
          channel: listed
          cache: true
        env:
          FIREFOX_CLIENT_ID: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_CLIENT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      - name: Update Chrome Web Store listing
        uses: ninoseki/go-webext-action@c7216cca9656856a307ca5af64ddbb4c70831a99 # v1.1.0
        with:
          version: ${{ env.GO_WEBEXT_VERSION }}
          command: update
          browser: chrome
          app-id: ${{ env.CHROME_APP_ID }}
          file: .output/mitaka-${{ env.VERSION }}-chrome.zip
          cache: true
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
      - name: Publish to Chrome Web Store
        uses: ninoseki/go-webext-action@c7216cca9656856a307ca5af64ddbb4c70831a99 # v1.1.0
        with:
          version: ${{ env.GO_WEBEXT_VERSION }}
          command: publish
          browser: chrome
          app-id: ${{ env.CHROME_APP_ID }}
          cache: true
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
